# Project-wide Gradle settings.

# Increase memory for Gradle daemon
org.gradle.jvmargs=-Xmx4096m -XX:+UseParallelGC -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# Kotlin daemon memory
kotlin.daemon.jvm.options=-Xmx2048m

# Enable parallel builds
org.gradle.parallel=true

# Enable build cache
org.gradle.caching=true

# Enable configuration cache (skips configuration phase if nothing changed)
org.gradle.configuration-cache=true

# Watch file system for changes to avoid re-scanning everything
org.gradle.vfs.watch=true

# Kotlin incremental compilation
kotlin.incremental=true
kotlin.incremental.useClasspathSnapshot=true

# Android-specific optimizations
android.useAndroidX=true
android.enableJetifier=false
android.nonTransitiveRClass=true

# Official Kotlin code style
kotlin.code.style=official
